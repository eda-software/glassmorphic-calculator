<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphic Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>
    <div class="app-wrapper">
        <div class="calculator-container">
            <header class="calc-header">
                <button class="btn-theme" id="theme-toggle">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button class="btn-action-icon" id="history-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </button>
            </header>
            <div class="calc-display">
                <div class="display-expression" id="display-expr"></div>
                <div class="display-main" id="display-val">0</div>
            </div>
            <div class="calc-grid">
                <button class="btn btn-ctrl" data-action="clear">C</button>
                <button class="btn btn-ctrl" data-action="backspace">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0 -2-2z"/>
                        <line x1="18" y1="9" x2="12" y2="15"/>
                        <line x1="12" y1="9" x2="18" y2="15"/>
                    </svg>
                </button>
                <button class="btn btn-ctrl" data-val="%">%</button>
                <button class="btn btn-op" data-val="/">&divide;</button>
                <button class="btn btn-num" data-val="7">7</button>
                <button class="btn btn-num" data-val="8">8</button>
                <button class="btn btn-num" data-val="9">9</button>
                <button class="btn btn-op" data-val="*">&times;</button>
                <button class="btn btn-num" data-val="4">4</button>
                <button class="btn btn-num" data-val="5">5</button>
                <button class="btn btn-num" data-val="6">6</button>
                <button class="btn btn-op" data-val="-">&minus;</button>
                <button class="btn btn-num" data-val="1">1</button>
                <button class="btn btn-num" data-val="2">2</button>
                <button class="btn btn-num" data-val="3">3</button>
                <button class="btn btn-op" data-val="+">+</button>
                <button class="btn btn-ctrl" data-action="negate">&plusmn;</button>
                <button class="btn btn-num" data-val="0">0</button>
                <button class="btn btn-num" data-val=".">.</button>
                <button class="btn btn-equal" data-action="calculate">=</button>
            </div>
        </div>
        <div class="history-panel" id="history-panel">
            <div class="history-header">
                <h3>Calculation History</h3>
                <button class="btn-clear-history" id="clear-history">Clear</button>
            </div>
            <div class="history-list" id="history-list">
                <div class="history-empty">No history yet</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
